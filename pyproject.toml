# Root pyproject.toml — shared tooling config for the ha-nanit monorepo.
# aionanit is vendored under custom_components/nanit/aionanit/.

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "B",      # flake8-bugbear
    "BLE",    # flake8-blind-except
    "C4",     # flake8-comprehensions
    "D",      # pydocstyle
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "ICN",    # flake8-import-conventions
    "N",      # pep8-naming
    "PGH",    # pygrep-hooks
    "PIE",    # flake8-pie
    "RUF",    # Ruff-specific rules
    "SIM",    # flake8-simplify
    "T20",    # flake8-print
    "UP",     # pyupgrade
    "W",      # pycodestyle warnings
]
ignore = [
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
    "D203",   # 1 blank line before class docstring (conflicts with D211)
    "D213",   # Multi-line summary second line (conflicts with D212)
    "E501",   # Line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "T20", "E402", "SIM117"]
"tools/**" = ["D", "T20", "SIM117"]
"**/proto/*_pb2.py" = ["ALL"]
"**/proto/*_pb2.pyi" = ["ALL"]
"custom_components/nanit/aionanit/**" = ["D", "N818", "BLE001", "SIM105", "SIM117", "E402", "RUF059", "C408"]
"custom_components/nanit/config_flow.py" = ["BLE001"]
"custom_components/nanit/aionanit_sl/**" = ["BLE001", "D", "SIM105"]
"tests/unit/test_sl_*" = ["BLE001", "SIM105"]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.nanit"]

[tool.mypy]
python_version = "3.14"
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["nanit.aionanit.proto", "nanit.aionanit.proto.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = "nanit.aionanit.camera"
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = "custom_components.nanit.*"
disallow_subclassing_any = false
disallow_untyped_decorators = false

[tool.coverage.run]
omit = ["custom_components/nanit/aionanit_sl/*"]
