name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to (re)publish, e.g. v1.4.1 or v1.4.1-beta.1"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  resolve:
    name: Resolve Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
      semver: ${{ steps.meta.outputs.semver }}
      pep440: ${{ steps.meta.outputs.pep440 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG }}

      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ env.TAG }}"
          version="${tag#v}"

          if [[ "$version" == *-beta.* ]]; then
            base="${version%-beta.*}"
            beta_num="${version##*-beta.}"
            pep440="${base}b${beta_num}"
          else
            pep440="$version"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "semver=${version}" >> "$GITHUB_OUTPUT"
          echo "pep440=${pep440}" >> "$GITHUB_OUTPUT"

          is_pre=$(gh release view "${tag}" --json isPrerelease -q .isPrerelease)
          if [ "${is_pre}" = "false" ] && [[ "${tag}" == v* ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

  ci-gate:
    name: CI Gate
    needs: resolve
    if: needs.resolve.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r dev/requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run mypy on integration
        run: mypy custom_components/nanit --config-file pyproject.toml --python-version 3.14

      - name: Run integration tests with coverage
        run: python -m pytest tests/unit/ -v --tb=short --cov=custom_components/nanit

      - name: Run library tests with coverage
        run: python -m pytest tests/lib/ -v --tb=short --cov=custom_components/nanit --cov-append --cov-fail-under=80

  attach-artifact:
    name: Attach Release Artifact
    needs: [resolve]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Inject version from tag
        env:
          SEMVER: ${{ needs.resolve.outputs.semver }}
        run: |
          jq --arg v "$SEMVER" '.version = $v' \
            custom_components/nanit/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/nanit/manifest.json

      - name: Create integration zip
        run: zip -r nanit.zip custom_components/nanit/

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.resolve.outputs.tag }}" nanit.zip --clobber

  update-main-version:
    name: Update Main Branch Version
    needs: resolve
    if: needs.resolve.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Inject stable version into manifest
        env:
          SEMVER: ${{ needs.resolve.outputs.semver }}
        run: |
          jq --arg v "$SEMVER" '.version = $v' \
            custom_components/nanit/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/nanit/manifest.json

      - name: Create version bump PR
        env:
          SEMVER: ${{ needs.resolve.outputs.semver }}
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="chore/bump-version-v${SEMVER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$branch" 2>/dev/null || true
          git checkout -b "$branch"
          git add custom_components/nanit/manifest.json
          git commit -m "chore: bump version to v${SEMVER} [skip ci]"
          git push origin "$branch"
          gh pr create \
            --title "chore: bump version to v${SEMVER}" \
            --body "Automated version bump after stable release v${SEMVER}." \
            --base main \
            --head "$branch"
